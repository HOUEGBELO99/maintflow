# Local development infrastructure for MaintFlow.
# Postgres mirrors the Supabase database; Redis backs BullMQ jobs.
# In production these are replaced by Supabase Cloud + Upstash.

services:
  postgres:
    image: postgres:16-alpine
    container_name: maintflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: maintflow
      POSTGRES_PASSWORD: maintflow
      POSTGRES_DB: maintflow
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U maintflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maintflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
