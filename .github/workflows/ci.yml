name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: Lint · Typecheck · Test · Build (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Prisma client is needed for the API to typecheck.
      - run: pnpm --filter @maintflow/api db:generate

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  flutter:
    name: Analyze · Test (Flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          # Pin to the FVM-managed version (see apps/mobile/.fvmrc).
          flutter-version: 3.35.7
          channel: stable
          cache: true
      - working-directory: apps/mobile
        run: flutter pub get
      # Format-check hand-written code before generating (generated files are
      # git-ignored, so they aren't present yet at this point).
      - working-directory: apps/mobile
        run: dart format --output=none --set-exit-if-changed .
      # Generated code (*.g.dart / *.freezed.dart / Drift) is not committed —
      # regenerate it before analyze/test or the `part` references won't resolve.
      - working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs
      - working-directory: apps/mobile
        run: flutter analyze
      - working-directory: apps/mobile
        run: flutter test
